[package]
name = "rff"
description = "Remade FFmpeg (Rust): the engine facade — registers built-in codecs/formats and exposes the high-level transcode & probe API."
version.workspace = true
edition.workspace = true
license.workspace = true
repository.workspace = true
rust-version.workspace = true

[dependencies]
rff-core.workspace = true
rff-codec.workspace = true
rff-format.workspace = true
rff-filter.workspace = true
rff-resample.workspace = true
rff-codec-h264.workspace = true
rff-codec-opus.workspace = true
rff-codec-avif.workspace = true
rff-codec-png.workspace = true
rff-codec-jpeg.workspace = true
rff-codec-gif.workspace = true
rff-codec-webp.workspace = true
rff-codec-pcm.workspace = true
rff-codec-vorbis.workspace = true
rff-codec-flac.workspace = true
rff-codec-jxl.workspace = true
rff-codec-aac.workspace = true
rff-codec-vp9.workspace = true
rff-codec-mp3.workspace = true
rff-format-avi.workspace = true
rff-format-avif.workspace = true
rff-format-png.workspace = true
rff-format-jpeg.workspace = true
rff-format-gif.workspace = true
rff-format-webp.workspace = true
rff-format-wav.workspace = true
rff-format-ogg.workspace = true
rff-format-flac.workspace = true
rff-format-jxl.workspace = true
rff-format-mp4.workspace = true
rff-format-mkv.workspace = true

# TEMPORARY, opt-in only: Cisco openh264 (C/FFI). Off by default so the normal
# build stays 100% Rust. Enable with `--features h264-openh264`.
rff-codec-openh264 = { workspace = true, optional = true }

[features]
# H.264 defaults to rusty_h264 with its SIMD speedup on — substantially faster.
# `h264-asm` assembles rusty_h264-accel's *vendored* openh264 SIMD kernels
# (BSD-2, no external source tree needed), so the only added build dependency is
# `nasm`. This is the project's one documented exception to "100% pure Rust":
# the kernels are hand-written x86 assembly in a single isolated `unsafe` crate.
# Build with `--no-default-features` for the pure-Rust scalar path (no `nasm`).
default = ["h264-asm"]
h264-asm = ["rff-codec-h264/asm"]
# Working H.264 via the C openh264 library — an opt-in cross-check / fallback to
# the default in-house pure-Rust codec. NOT pure Rust; needs a C toolchain.
h264-openh264 = ["dep:rff-codec-openh264"]
