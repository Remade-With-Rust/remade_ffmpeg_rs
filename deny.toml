# cargo-deny configuration — enforces the "no copyleft" promise from the README.
# Run in CI with:  cargo deny check licenses bans
#
# Any license NOT in `allow` causes a hard failure, so GPL/LGPL/AGPL/MPL can
# never sneak into the dependency tree.

[graph]
# Scope the gate to the embeddable core (library, CLI, server, codecs, formats).
# `rff-ui` is the optional Dioxus front-end — built on demand, never part of the
# core or the published binaries — and it transitively pulls MPL-2.0 crates via
# wry/servo. Excluding it drops its unique subtree, so the license promise is
# enforced everywhere it actually applies. The UI's own licensing is tracked
# separately (see docs/architecture.md).
exclude = ["rff-ui"]

[licenses]
confidence-threshold = 0.9
allow = [
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "MIT",
    "MIT-0",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Zlib",
    "Unicode-3.0",
    "CC0-1.0",
    # University of Illinois/NCSA Open Source License — BSD-style, permissive,
    # OSI-approved and FSF-Free (NOT copyleft). Reaches us via libfuzzer-sys in
    # rav1e's tree.
    "NCSA",
    # Independent JPEG Group license — the permissive libjpeg license (NOT
    # copyleft); the `jpeg-encoder` crate reimplements IJG's algorithms in Rust.
    "IJG",
]

[bans]
# Explicit belt-and-suspenders deny list for copyleft families, in case one is
# ever added to `allow` by mistake.
deny = []
multiple-versions = "warn"

[advisories]
yanked = "deny"
# `paste` (RUSTSEC-2024-0436) is flagged *unmaintained*, not vulnerable — a
# stable proc-macro pulled in transitively (via rav1e / codec deps) with no
# known security issue and no drop-in replacement under our control.
# Acknowledge it explicitly; revisit if the upstreams migrate off it.
#
# The five below ALL originate from `rustls-rustcrypto 0.0.2-alpha` — the pure-Rust
# (ring-free) crypto provider behind the *opt-in, experimental* HTTPS input stack.
# It is present only under `--all-features` (never in the default build), is the
# LATEST published version, and pins the affected transitive crates, so there is no
# upstream fix to take today (a `[patch]` to newer webpki would break its API):
#   * RUSTSEC-2023-0071 — `rsa` "Marvin" RSA timing sidechannel. No fixed `rsa`
#     release exists, and it is not in a practical attack path here (we don't run
#     attacker-probed RSA operations when fetching HTTPS media).
#   * RUSTSEC-2026-0049/0098/0099/0104 — `rustls-webpki 0.102` cert-path bugs (CRL
#     matching, URI/wildcard name constraints, a reachable panic in CRL parsing).
# Accepted ONLY for the experimental HTTPS feature. TRACK: update/replace
# `rustls-rustcrypto` (or swap the crypto provider) to clear these.
ignore = [
    "RUSTSEC-2024-0436",
    "RUSTSEC-2023-0071",
    "RUSTSEC-2026-0049",
    "RUSTSEC-2026-0098",
    "RUSTSEC-2026-0099",
    "RUSTSEC-2026-0104",
]
