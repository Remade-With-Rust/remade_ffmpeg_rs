name: ci

on:
  push:
    branches: [main]
  pull_request:

env:
  CARGO_TERM_COLOR: always

# `rff-ui` (the Dioxus front-end) is excluded from build-requiring jobs: it
# needs a system webview toolchain and pulls MPL deps, and is never part of the
# core or the published binaries — the same scoping as `default-members` and
# `deny.toml`. The default build also needs `nasm` for the `h264-asm` path.

jobs:
  fmt:
    name: rustfmt
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - run: cargo fmt --all --check

  test:
    name: test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: ilammy/setup-nasm@v1
      - uses: Swatinem/rust-cache@v2
      - run: cargo test --workspace --exclude rff-ui --locked

  clippy:
    name: clippy (informational)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: ilammy/setup-nasm@v1
      - uses: Swatinem/rust-cache@v2
      # Not yet `-D warnings`: ~350 pre-existing lints, ~220 of them intentional
      # excessive-precision in codec constant tables. Surfaced here; tightening
      # to a hard gate is a tracked follow-up cleanup.
      - run: cargo clippy --workspace --exclude rff-ui --all-targets

  deny:
    name: cargo-deny
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: EmbarkStudios/cargo-deny-action@v2

  # The decoder's defining property — bit-exact vs the official libvpx vectors —
  # is otherwise only checkable by hand (the gate is `#[ignore]` because the
  # vectors are large + external). Fetch a cached subset and run it on every PR
  # so a change that moves one output pixel turns CI red.
  conformance:
    name: vp9 conformance (bit-exact)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: ilammy/setup-nasm@v1
      - uses: Swatinem/rust-cache@v2
      - name: Cache VP9 test vectors
        id: vectors
        uses: actions/cache@v4
        with:
          path: vp9-vectors
          # Re-fetch only when the vector list changes.
          key: vp9-vectors-${{ hashFiles('scripts/fetch-vp9-vectors.sh') }}
      - name: Fetch vectors (on cache miss)
        if: steps.vectors.outputs.cache-hit != 'true'
        run: bash scripts/fetch-vp9-vectors.sh "$GITHUB_WORKSPACE/vp9-vectors"
      - name: Decode every vector, assert per-frame I420 MD5 is bit-exact
        env:
          VP9_VECTORS_DIR: ${{ github.workspace }}/vp9-vectors
        run: cargo test -p rff --test vp9_conformance --release --locked -- --ignored --nocapture

  # Untrusted-input robustness: mutated/truncated/random byte streams (seeded
  # from a real coded frame) must surface as `Err`, never panic. Deterministic
  # seed, so a failure is reproducible from the printed seed. No external data.
  fuzz:
    name: vp9 decode fuzz (robustness)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: 50k malformed streams must never panic
        env:
          VP9_FUZZ_ITERS: "50000"
        run: cargo test -p rff-codec-vp9 --release --locked fuzz_robustness -- --ignored --nocapture
